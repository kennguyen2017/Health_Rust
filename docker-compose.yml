name: health-rust-backend

services:
  db:
    image: postgres:16-alpine
    container_name: health-rust-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_rust_backend
    ports:
      - "5433:5432"
    volumes:
      - health-rust-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_rust_backend"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  health-rust-postgres-data: