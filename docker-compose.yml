name: health-rust-backend

services:
  db:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-health-rust-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-health_rust_backend}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - health-rust-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  health-rust-postgres-data: